<mat-toolbar class="app-header">
  <!-- Left side -->
  <div class="header-left">
    <button mat-icon-button class="menu-toggle" (click)="onMenuToggle()" aria-label="Toggle sidebar">
      <mat-icon>menu</mat-icon>
    </button>

    <span class="page-title" *ngIf="pageTitle">{{ pageTitle }}</span>
    <span class="school-name" *ngIf="!pageTitle && schoolName">{{ schoolName }}</span>
  </div>

  <!-- Right side -->
  <div class="header-right">
    <!-- Dark mode toggle -->
    <button
      mat-icon-button
      class="header-icon-btn"
      (click)="toggleDarkMode()"
      [matTooltip]="isDarkMode ? 'Light mode' : 'Dark mode'"
    >
      <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- Notifications bell → opens the Inbox tab on /notifications -->
    <button
      *ngIf="!isSuperAdmin"
      mat-icon-button
      class="header-icon-btn bell-btn"
      (click)="navigateToNotifications()"
      matTooltip="Notifications"
    >
      <mat-icon>notifications</mat-icon>
      <span class="bell-badge" *ngIf="unreadCount > 0">{{ badgeLabel }}</span>
    </button>

    <!-- User avatar and menu -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="userMenu"
      class="avatar-btn"
      matTooltip="Account"
    >
      <div class="user-avatar">
        <img
          *ngIf="user?.profilePhotoUrl"
          [src]="user!.profilePhotoUrl"
          [alt]="userName"
          class="avatar-img"
        />
        <span *ngIf="!user?.profilePhotoUrl" class="avatar-text">{{ userInitial }}</span>
      </div>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before" class="user-menu">
      <div class="user-info" (click)="$event.stopPropagation()">
        <strong class="user-name">{{ userName }}</strong>
        <span class="user-email">{{ userEmail }}</span>
        <span class="user-role-badge">{{ roleDisplay }}</span>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="navigateToProfile()">
        <mat-icon>person</mat-icon>
        <span>My Profile</span>
      </button>
      <button mat-menu-item (click)="navigateToSettings()">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item class="logout-item" (click)="logout()">
        <mat-icon color="warn">logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
