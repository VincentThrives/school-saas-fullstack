<div class="assignments-list-container">
  <app-page-header
    title="Assignments"
    subtitle="Manage and track assignments"
    [breadcrumbs]="[
      { label: 'Dashboard', link: '/dashboard' },
      { label: 'Assignments' }
    ]"
    [actionLabel]="isTeacher ? 'Create Assignment' : ''"
    actionIcon="add"
    (actionClick)="createAssignment()"
  ></app-page-header>

  <mat-card class="table-card">
    <table mat-table [dataSource]="assignments" class="assignments-table">
      <!-- Title -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let a">{{ a.title }}</td>
      </ng-container>

      <!-- Class -->
      <ng-container matColumnDef="className">
        <th mat-header-cell *matHeaderCellDef>Class</th>
        <td mat-cell *matCellDef="let a">{{ a.className }}</td>
      </ng-container>

      <!-- Subject -->
      <ng-container matColumnDef="subjectName">
        <th mat-header-cell *matHeaderCellDef>Subject</th>
        <td mat-cell *matCellDef="let a">{{ a.subjectName }}</td>
      </ng-container>

      <!-- Due Date -->
      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef>Due Date</th>
        <td mat-cell *matCellDef="let a">{{ a.dueDate | date:'dd MMM yyyy' }}</td>
      </ng-container>

      <!-- Submissions (Teacher) -->
      <ng-container matColumnDef="submissions">
        <th mat-header-cell *matHeaderCellDef>Submissions</th>
        <td mat-cell *matCellDef="let a">
          <span class="submissions-count">{{ a.submissionsCount }} / {{ a.totalStudents }}</span>
        </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let a">
          <mat-chip [class]="getStatusClass(a.status)" class="status-chip">
            {{ a.status }}
          </mat-chip>
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let a" class="actions-col">
          <button mat-icon-button (click)="viewAssignment(a.assignmentId); $event.stopPropagation()">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button *ngIf="isTeacher" (click)="editAssignment(a.assignmentId); $event.stopPropagation()">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;"
        class="table-row clickable-row"
        (click)="viewAssignment(row.assignmentId)"
      ></tr>
    </table>

    <div class="loading-row" *ngIf="isLoading">
      <mat-spinner diameter="36"></mat-spinner>
    </div>

    <div class="empty-state" *ngIf="!isLoading && assignments.length === 0">
      <mat-icon class="empty-icon">assignment</mat-icon>
      <p>No assignments found</p>
    </div>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    ></mat-paginator>
  </mat-card>
</div>
