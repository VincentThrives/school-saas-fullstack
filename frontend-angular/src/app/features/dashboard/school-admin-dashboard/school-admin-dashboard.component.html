<div class="school-admin-dashboard">
  <app-page-header
    title="School Dashboard"
    [subtitle]="currentYearLabel ? ('Showing data for ' + currentYearLabel) : ''">
  </app-page-header>

  <!-- Stats Grid -->
  <div class="school-admin-dashboard__stats">
    <app-stat-card
      title="Total Students"
      [value]="(stats.totalStudents ?? 0).toLocaleString()"
      icon="school"
      color="primary"
    ></app-stat-card>
    <app-stat-card
      title="Total Teachers"
      [value]="(stats.totalTeachers ?? 0).toLocaleString()"
      icon="person"
      color="info"
    ></app-stat-card>
    <app-stat-card
      title="Today's Attendance"
      [value]="(stats.attendanceTodayPercent ?? 0) + '%'"
      icon="event_note"
      color="success"
    ></app-stat-card>
    <app-stat-card
      title="Active Classes"
      [value]="(stats.totalClasses ?? 0).toLocaleString()"
      icon="class"
      color="warning"
    ></app-stat-card>
  </div>

  <!-- Quick Actions & Lists -->
  <div class="school-admin-dashboard__panels">
    <!-- Upcoming Exams -->
    <mat-card class="school-admin-dashboard__panel">
      <mat-card-header>
        <mat-icon mat-card-avatar class="school-admin-dashboard__panel-icon">assignment</mat-icon>
        <mat-card-title>Upcoming Exams</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="panel-loading" *ngIf="isLoadingExams">
          <mat-spinner diameter="24"></mat-spinner>
        </div>

        <div class="panel-empty" *ngIf="!isLoadingExams && upcomingExams.length === 0">
          <mat-icon>event_busy</mat-icon>
          <span>No upcoming exams scheduled</span>
        </div>

        <mat-list *ngIf="!isLoadingExams && upcomingExams.length > 0">
          <mat-list-item *ngFor="let exam of upcomingExams">
            <div class="school-admin-dashboard__list-item">
              <div class="school-admin-dashboard__item-avatar">
                <mat-icon>assignment</mat-icon>
              </div>
              <div class="school-admin-dashboard__item-info">
                <span class="school-admin-dashboard__item-title">{{ exam.name }}</span>
                <span class="school-admin-dashboard__item-meta">{{ exam.subjectName }} &bull; {{ formatDate(exam.date) }}</span>
              </div>
            </div>
          </mat-list-item>
        </mat-list>
      </mat-card-content>
    </mat-card>

    <!-- Upcoming Events -->
    <mat-card class="school-admin-dashboard__panel">
      <mat-card-header>
        <mat-icon mat-card-avatar class="school-admin-dashboard__panel-icon">event</mat-icon>
        <mat-card-title>Upcoming Events</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="panel-loading" *ngIf="isLoadingEvents">
          <mat-spinner diameter="24"></mat-spinner>
        </div>

        <div class="panel-empty" *ngIf="!isLoadingEvents && upcomingEvents.length === 0">
          <mat-icon>event_busy</mat-icon>
          <span>No upcoming events scheduled</span>
        </div>

        <mat-list *ngIf="!isLoadingEvents && upcomingEvents.length > 0">
          <mat-list-item *ngFor="let event of upcomingEvents">
            <div class="school-admin-dashboard__list-item">
              <div class="school-admin-dashboard__item-avatar">
                <mat-icon>event</mat-icon>
              </div>
              <div class="school-admin-dashboard__item-info">
                <span class="school-admin-dashboard__item-title">{{ event.title }}</span>
                <span class="school-admin-dashboard__item-meta">{{ formatDate(event.startDate) }}</span>
              </div>
              <span class="school-admin-dashboard__item-badge">{{ event.type }}</span>
            </div>
          </mat-list-item>
        </mat-list>
      </mat-card-content>
    </mat-card>
  </div>
</div>
