<div class="user-form-container">
  <app-page-header
    [title]="pageTitle"
    [breadcrumbs]="[
      { label: 'Dashboard', link: '/dashboard' },
      { label: 'Users', link: '/users' },
      { label: isEditing ? 'Edit' : 'Create' }
    ]">
  </app-page-header>

  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card *ngIf="!isLoading" class="form-card">
    <mat-card-content>
      <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" placeholder="Enter first name">
            <mat-error *ngIf="userForm.get('firstName')?.invalid">
              {{ getErrorMessage('firstName') }}
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" placeholder="Enter last name">
            <mat-error *ngIf="userForm.get('lastName')?.invalid">
              {{ getErrorMessage('lastName') }}
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" placeholder="Enter email address">
            <mat-error *ngIf="userForm.get('email')?.invalid">
              {{ getErrorMessage('email') }}
            </mat-error>
            <mat-hint *ngIf="isEditing">Email cannot be changed</mat-hint>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" placeholder="Enter phone number">
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Role</mat-label>
            <mat-select formControlName="role">
              <mat-option *ngFor="let role of roles" [value]="role.value">
                {{ role.label }}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="userForm.get('role')?.invalid">
              {{ getErrorMessage('role') }}
            </mat-error>
            <mat-hint *ngIf="isEditing">Role cannot be changed</mat-hint>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field" *ngIf="!isEditing">
            <mat-label>Password</mat-label>
            <input matInput formControlName="password" type="password" placeholder="Enter password">
            <mat-error *ngIf="userForm.get('password')?.invalid">
              {{ getErrorMessage('password') }}
            </mat-error>
            <mat-hint>Minimum 8 characters</mat-hint>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">
            <mat-icon>arrow_back</mat-icon>
            Cancel
          </button>
          <button mat-raised-button class="save-button" type="submit" [disabled]="isSaving">
            <mat-spinner diameter="20" *ngIf="isSaving"></mat-spinner>
            <mat-icon *ngIf="!isSaving">save</mat-icon>
            {{ isEditing ? 'Update User' : 'Create User' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
