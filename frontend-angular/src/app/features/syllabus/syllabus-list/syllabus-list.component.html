<div class="syllabus-list-container">
  <app-page-header
    title="Syllabus Tracker"
    subtitle="Track subject-wise syllabus completion"
    [breadcrumbs]="[
      { label: 'Dashboard', link: '/dashboard' },
      { label: 'Syllabus Tracker' }
    ]"
    actionLabel="Create Syllabus"
    actionIcon="add"
    (actionClick)="createSyllabus()"
  ></app-page-header>

  <mat-card class="filter-card">
    <div class="filter-row">
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Class</mat-label>
        <mat-select [(ngModel)]="selectedClassId" (selectionChange)="loadSyllabus()">
          <mat-option value="">All Classes</mat-option>
          <mat-option *ngFor="let cls of classes" [value]="cls.id">{{ cls.name }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Academic Year</mat-label>
        <mat-select [(ngModel)]="selectedAcademicYearId" (selectionChange)="loadSyllabus()">
          <mat-option *ngFor="let ay of academicYears" [value]="ay.academicYearId">{{ ay.label }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card>

  <div class="loading-row" *ngIf="isLoading">
    <mat-spinner diameter="36"></mat-spinner>
  </div>

  <div class="syllabus-grid" *ngIf="!isLoading">
    <mat-card class="syllabus-card" *ngFor="let s of syllabusList" (click)="viewDetail(s.syllabusId)">
      <div class="card-header">
        <div class="subject-info">
          <h3 class="subject-name">{{ s.subjectName }}</h3>
          <span class="class-name">{{ s.className }}</span>
        </div>
        <mat-icon class="card-icon">menu_book</mat-icon>
      </div>

      <div class="teacher-name" *ngIf="s.teacherName">
        <mat-icon class="teacher-icon">person</mat-icon>
        {{ s.teacherName }}
      </div>

      <div class="progress-section">
        <div class="progress-header">
          <span>Progress</span>
          <span class="progress-value">{{ s.progressPercentage | number:'1.0-0' }}%</span>
        </div>
        <mat-progress-bar
          mode="determinate"
          [value]="s.progressPercentage"
          class="progress-bar"
        ></mat-progress-bar>
      </div>

      <div class="topics-count">
        <span>{{ s.completedTopics }} / {{ s.totalTopics }} topics completed</span>
      </div>
    </mat-card>
  </div>

  <div class="empty-state" *ngIf="!isLoading && syllabusList.length === 0">
    <mat-icon class="empty-icon">menu_book</mat-icon>
    <p>No syllabus records found</p>
  </div>
</div>
