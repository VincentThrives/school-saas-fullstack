<div class="id-card-container">
  <app-page-header
    title="ID Card Generator"
    subtitle="Generate ID cards for students and teachers"
    [breadcrumbs]="[
      { label: 'Dashboard', link: '/dashboard' },
      { label: 'ID Card Generator' }
    ]"
  ></app-page-header>

  <mat-card class="filter-card">
    <div class="filter-row">
      <mat-radio-group [(ngModel)]="userType" (change)="onUserTypeChange()" class="type-radio">
        <mat-radio-button value="STUDENT">Student</mat-radio-button>
        <mat-radio-button value="TEACHER">Teacher</mat-radio-button>
      </mat-radio-group>

      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search by name or email</mat-label>
        <input matInput [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()" placeholder="Type to filter...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>
  </mat-card>

  <mat-card class="table-card">
    <div class="table-header">
      <span class="selected-count" *ngIf="selection.selected.length > 0">
        {{ selection.selected.length }} selected
      </span>
      <button
        mat-raised-button
        class="generate-btn"
        [disabled]="selection.isEmpty() || isGenerating"
        (click)="generateIdCards()"
      >
        <mat-icon>badge</mat-icon>
        {{ isGenerating ? 'Generating...' : 'Generate ID Cards' }}
      </button>
    </div>

    <table mat-table [dataSource]="filteredUsers" class="users-table">
      <!-- Checkbox -->
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef>
          <mat-checkbox
            (change)="toggleAllRows()"
            [checked]="isAllSelected()"
            [indeterminate]="selection.hasValue() && !isAllSelected()"
          ></mat-checkbox>
        </th>
        <td mat-cell *matCellDef="let user">
          <mat-checkbox
            (click)="$event.stopPropagation()"
            (change)="selection.toggle(user)"
            [checked]="selection.isSelected(user)"
          ></mat-checkbox>
        </td>
      </ng-container>

      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{ user.firstName }} {{ user.lastName }}</td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <!-- Role -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">{{ user.role }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;"
        class="table-row"
        (click)="selection.toggle(row)"
      ></tr>
    </table>

    <div class="loading-row" *ngIf="isLoading">
      <mat-spinner diameter="36"></mat-spinner>
    </div>

    <div class="empty-state" *ngIf="!isLoading && filteredUsers.length === 0">
      <mat-icon class="empty-icon">badge</mat-icon>
      <p>No {{ userType === 'STUDENT' ? 'students' : 'teachers' }} found</p>
    </div>
  </mat-card>
</div>
