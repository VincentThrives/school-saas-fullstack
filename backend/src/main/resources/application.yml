spring:
  application:
    name: school-management-saas

  # MongoDB - central DB (tenant registry)
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017}
      database: saas_central
      auto-index-creation: true

  # Mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cache
  cache:
    type: simple  # switch to 'redis' when Redis is available

  # File upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTTokenSigningMustBe256BitsAtMinimum!!}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:86400000}      # 24 hours (dev-friendly)
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:2592000000}  # 30 days (rolling — clock resets on every refresh)
    super-admin-access-expiry-ms: ${SA_ACCESS_EXPIRY:86400000} # 24 hours (dev-friendly)

  # File storage
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size-mb: 10
    allowed-types: image/jpeg,image/png,application/pdf,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet

  # CORS
  # Default covers all known frontend origins:
  #   - localhost:5173/3000/4200 → Vite/CRA/Angular dev servers
  #   - https://vtschoolsaas.netlify.app → production web deploy on Netlify
  #   - https://localhost / http://localhost → Capacitor Android WebView
  #     (the WebView's origin is `https://localhost` on Android with the
  #     default Capacitor scheme; the http variant covers debug builds and
  #     iOS simulators).
  # Render is configured to override this via the CORS_ORIGINS env var —
  # keep that list in sync with this default whenever a new origin is added.
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4200,https://vtschoolsaas.netlify.app,https://localhost,http://localhost}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

  # Rate limiting (requests/minute)
  rate-limit:
    auth-login: 10
    super-auth-login: 5
    resolve-tenant: 20
    default: 200

  # WhatsApp Cloud API
  whatsapp:
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    api-version: ${WHATSAPP_API_VERSION:v21.0}
    api-base-url: ${WHATSAPP_API_BASE_URL:https://graph.facebook.com}

# Firebase Cloud Messaging — service account credentials for sending push.
# Set ONE of these on Render:
#   FIREBASE_CREDENTIALS_PATH: path to a Secret File (preferred)
#   FIREBASE_CREDENTIALS_JSON: full JSON content as an env var (fallback)
# Both empty → push notifications silently disabled at startup.
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

  # Tenant provisioning defaults
  tenant:
    default-max-students: 500
    default-max-users: 30
    default-storage-gb: 5
    data-retention-days: 90

# Springdoc (Swagger)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── SMS module configuration ──────────────────────────────────────────
# All real values come from environment variables on Render. SMS_ENABLED
# defaults to TRUE because the real on/off control is now per-tenant:
# Super Admin enables individual schools via SMS Control and pastes
# their DLT templates inline. Each tenant must still be opted in
# (TenantSmsSettings.enabled), so an unsetup tenant can't accidentally
# fire SMS. Override with SMS_ENABLED=false only for a true platform-
# wide emergency stop (e.g. MSG91 outage, fraud investigation).
sms:
  enabled: ${SMS_ENABLED:true}
  cost-per-sms-inr: ${SMS_COST_PER_INR:0.25}
  retry:
    max-attempts: ${SMS_RETRY_MAX:3}
    backoff-ms: ${SMS_RETRY_BACKOFF_MS:1000}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    sender-id: ${MSG91_SENDER_ID:VTPLS}
    base-url: ${MSG91_BASE_URL:https://api.msg91.com/api/v5}
    templates:
      absence-alert:   ${MSG91_TPL_ABSENCE_ALERT:}
      result-combined: ${MSG91_TPL_RESULT_COMBINED:}
      result-single:   ${MSG91_TPL_RESULT_SINGLE:}
      custom-notice:   ${MSG91_TPL_CUSTOM_NOTICE:}

---
# Test profile
spring:
  config:
    activate:
      on-profile: test
  data:
    mongodb:
      uri: mongodb://localhost:27017
      database: saas_central_test
